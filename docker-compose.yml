# Coolify deployment: the eve agent in production mode (a single container).
#
# Scheduling is NOT in this file. The daily run is driven by a Coolify
# "Scheduled Task" attached to this `agent` resource, which execs the trigger
# script inside the container on a cron cadence:
#   Name: daily-digest  Command: sh /app/scripts/trigger-digest.sh
#   Frequency: 0 7 * * *   Timeout: 900   Container name: agent
# See scripts/trigger-digest.sh and docs/superpowers/notes/running-in-production.md.
#
# Set these env vars in Coolify (do NOT commit real secrets):
#   TARGET_REPO        owner/name of the repo to digest
#   GH_TOKEN           GitHub PAT, scopes: repo + gist  (gh CLI authenticates from this)
#   GITHUB_LOGIN       optional; defaults to the gh-authenticated user
#   Model provider — OpenAI takes preference, but ONLY when BOTH of its vars are set:
#   OPENAI_API_KEY     OpenAI key (sk-...). With OPENAI_MODEL, the agent talks to OpenAI directly.
#   OPENAI_MODEL       OpenAI model slug (e.g. gpt-5-nano; avoid *-codex slugs). Required to use OpenAI.
#   OPENROUTER_API_KEY OpenRouter key — used unless BOTH OpenAI vars above are set.
#   OPENROUTER_MODEL   OpenRouter slug (default openai/gpt-5-nano; codex slugs reject our tool schemas)
#   SLACK_BOT_TOKEN    Slack bot token (xoxb-...)
#   SLACK_CHANNEL_ID   target channel id (e.g. C09HDQ4K1TQ); bot must be invited to it
#   MEMORY_GIST_ID     optional; the private gist holding memory.md
#   AGENT_BASIC_USER   trigger auth username (the scheduled task sends it). If unset, the
#   AGENT_BASIC_PASS   session endpoint is OPEN — only safe if port 3000 is not
#                      published publicly. Set both to require HTTP Basic.
#   EVE_LOG_DIR        optional; where the session logger writes (default
#                      /app/logs, persisted on the eve-logs volume below).
#
# Inspecting sessions: readable per-event traces stream to the agent container's
# stdout (visible in Coolify's log viewer) and are written to date-stamped files
# on the eve-logs volume. See scripts/helpers.sh (eve_logs / eve_logf / eve_errors)
# and docs/superpowers/notes/running-in-production.md.

services:
  agent:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      TARGET_REPO: ${TARGET_REPO}
      GITHUB_LOGIN: ${GITHUB_LOGIN:-}
      GH_TOKEN: ${GH_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # No default: OpenAI is used only when BOTH OPENAI_API_KEY and OPENAI_MODEL
      # are set, so leaving this empty keeps the agent on OpenRouter by default.
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-5-nano}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID}
      MEMORY_GIST_ID: ${MEMORY_GIST_ID:-}
      AGENT_BASIC_USER: ${AGENT_BASIC_USER:-}
      AGENT_BASIC_PASS: ${AGENT_BASIC_PASS:-}
      EVE_LOG_DIR: ${EVE_LOG_DIR:-/app/logs}
    # Persist session logs across restarts/redeploys so they stay inspectable.
    # In Coolify you can also add this as a Persistent Storage mount, or swap the
    # named volume for a bind mount (e.g. ./logs:/app/logs) to browse from the host.
    volumes:
      - eve-logs:/app/logs
    expose:
      - "3000"
    healthcheck:
      # any HTTP response on :3000 means the server is up (root may 404 — that's fine)
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    # Scheduling: add a Coolify "Scheduled Task" on this resource that runs
    #   sh /app/scripts/trigger-digest.sh
    # in the `agent` container on your chosen cron (e.g. 0 7 * * *). It replaces
    # the old digest-cron sidecar — no extra container needed.

volumes:
  eve-logs:
